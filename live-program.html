<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Live Program - Digsui Sadhana Banga Vidyalaya (H.S.)</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Noto+Sans:wght@300..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-[#0d121b] dark:text-white transition-colors duration-300">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        
        <header class="sticky top-0 z-50 w-full glass border-b border-slate-200/50 dark:border-slate-800/50 shadow-sm">
            <div class="px-4 md:px-10 py-3 flex items-center justify-between">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3 text-primary">
                        <span class="material-symbols-outlined text-3xl">live_tv</span>
                        <h2 class="text-[#0d121b] dark:text-white text-xl font-black">DSBV LIVE</h2>
                    </div>
                    <nav class="hidden lg:flex items-center gap-8">
                        <a class="relative group text-sm font-bold transition-colors" href="#">
                            Live Program
                            <span class="absolute -bottom-1 left-0 w-full h-0.5 bg-primary"></span>
                        </a>
                           <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <span class="material-symbols-outlined text-xl">dark_mode</span>
                    </nav>
                </div>
           
                </button>
                  <a href="index.html" class="group flex items-center gap-2 text-sm font-bold text-primary">
                <span class="transition-transform group-hover:-translate-x-1">←</span> Back to Home
            </a>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center w-full pb-20">
            
            <section class="w-full max-w-[1200px] px-4 pt-12">
                <div class="flex items-center gap-3 mb-6">
                    <div class="flex items-center gap-2 bg-red-600 text-white px-4 py-1.5 rounded-full text-sm font-bold animate-pulse">
                        <span class="size-2 bg-white rounded-full"></span> LIVE BROADCAST
                    </div>
                    <h1 class="text-2xl md:text-3xl font-black">Main Virtual Assembly</h1>
                </div>
                
                <div class="video-container shadow-2xl border-4 border-white dark:border-slate-800 rounded-[2rem]">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID_HERE" 
                            title="YouTube Live Stream" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen></iframe>
                </div>
            </section>

           
        </main>

        <footer class="w-full bg-[#0a0f1a] text-white py-10 px-4 text-center">
            <p class="text-slate-500 text-sm">© 2026 Digsui Sadhana Banga Vidyalaya (H.S.). Live Stream Portal.</p>
        </footer>
    </div>
</body>
</html>
